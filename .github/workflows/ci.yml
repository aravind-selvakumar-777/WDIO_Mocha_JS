name: WDIO Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --verbose

      - name: Run WDIO Tests
        run: npm run wdio || true

      - name: Generate Allure Report
        run: npm run report:generate
        if: always() 

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 1

      - name: Upload Final Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-allure-report
          path: allure-report
          retention-days: 10